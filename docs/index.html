<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
  <title>Dust &amp; Static</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0a0a14;
      overflow: hidden;
      width: 100%; height: 100%;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      position: absolute;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
//  DUST & STATIC  –  canvas prototype
//  Progressive difficulty staging + score system
// ─────────────────────────────────────────────

const W = 1280, H = 720;
const GROUND_Y = 530;      // top of ground surface

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
  canvas.style.left   = ((window.innerWidth  - W * s) / 2) + 'px';
  canvas.style.top    = ((window.innerHeight - H * s) / 2) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════
//  DIFFICULTY
// ══════════════════════════════════════════════
const STAGE_CONFIG = {
  1: { name: 'CALM',   color: '#00ff88', decayMult: 1.0, scoreMult: 1,   crateGapMin: 250, crateGapMax: 400,  scrollMult: 1.0  },
  2: { name: 'TENSE',  color: '#ffd700', decayMult: 1.5, scoreMult: 2,   crateGapMin: 350, crateGapMax: 550,  scrollMult: 1.2  },
  3: { name: 'HARSH',  color: '#ff8800', decayMult: 2.2, scoreMult: 3.5, crateGapMin: 500, crateGapMax: 750,  scrollMult: 1.5  },
  4: { name: 'BRUTAL', color: '#ff2640', decayMult: 3.5, scoreMult: 6,   crateGapMin: 700, crateGapMax: 1000, scrollMult: 2.0  },
};

function getDifficultyStage(t) {
  if (t < 60)  return 1;
  if (t < 180) return 2;
  if (t < 360) return 3;
  return 4;
}
function getDecayMult(stage)  { return STAGE_CONFIG[stage].decayMult; }
function getScoreMult(stage)  { return STAGE_CONFIG[stage].scoreMult; }

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault && ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code) && e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function rand(a, b)    { return Math.random() * (b - a) + a; }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
let state;          // 'playing' | 'dead'
let worldTime, difficultyStage, score;
let cameraX;
let player;
let platforms, crates;
let nextPlatformX, nextCrateX;
let worldRightEdge;
let stageFlash;     // { text, color, timer }
let bgRuins;

const HUNGER_DECAY_BASE = 1.0;
const THIRST_DECAY_BASE = 1.5;

function initGame() {
  state          = 'playing';
  worldTime      = 0;
  difficultyStage = 1;
  score          = 0;
  cameraX        = 0;

  player = {
    x: 200, y: GROUND_Y,
    w: 22,  h: 56,
    vx: 0, vy: 0,
    onGround: false,
    hunger:  100,
    thirst:  100,
    stamina: 100,
    health:  100,
    startX:  200,
    bobTimer: 0,
    dead:    false,
  };

  platforms      = [];
  crates         = [];
  worldRightEdge = 0;
  nextPlatformX  = 500;

  ensureGround(3000);
  nextCrateX = player.x + rand(STAGE_CONFIG[1].crateGapMin, STAGE_CONFIG[1].crateGapMax);

  stageFlash = null;

  // Procedural distant ruins for parallax
  bgRuins = [];
  for (let i = 0; i < 160; i++) {
    bgRuins.push({
      x:     i * 130 - 600,
      baseY: GROUND_Y,
      w:     rand(18, 65),
      h:     rand(35, 170),
      layer: rand(0.08, 0.4),
    });
  }
}

// ══════════════════════════════════════════════
//  WORLD GENERATION
// ══════════════════════════════════════════════
function ensureGround(toX) {
  const SEG = 700;
  while (worldRightEdge < toX) {
    platforms.push({ x: worldRightEdge, y: GROUND_Y, w: SEG + 4, h: 45, isGround: true });
    worldRightEdge += SEG;
  }
}

function spawnPlatform(cx) {
  const w = rand(80, 200);
  const y = GROUND_Y - rand(80, 210);
  platforms.push({ x: cx - w / 2, y, w, h: 18, isGround: false });
}

function spawnCrate(cx, cfg) {
  const types = ['food', 'water', 'medicine', 'fuel'];
  crates.push({
    x: cx - 16, y: GROUND_Y - 32,
    w: 32,      h: 32,
    type:      types[randInt(0, types.length - 1)],
    collected: false,
    label:     '',
    labelTimer: 0,
    labelY:    0,
  });
}

// ══════════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════════
function update(dt) {
  if (state !== 'playing') return;

  worldTime += dt;

  // ── Difficulty stage ──
  const newStage = getDifficultyStage(worldTime);
  if (newStage !== difficultyStage) {
    difficultyStage = newStage;
    const c = STAGE_CONFIG[newStage];
    stageFlash = { text: `STAGE ${newStage} — ${c.name}`, color: c.color, timer: 2.0 };
  }
  const cfg       = STAGE_CONFIG[difficultyStage];
  const decayMult = getDecayMult(difficultyStage);
  const scoreMult = getScoreMult(difficultyStage);

  // ── Player physics ──
  const GRAVITY    = 980;
  const WALK_SPEED = 160;
  const RUN_SPEED  = 280;
  const JUMP_VEL   = -520;

  const wantRun = (keys['ShiftLeft'] || keys['ShiftRight']) && player.stamina > 0;
  const speed   = wantRun ? RUN_SPEED : WALK_SPEED;
  let dir = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) dir = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dir =  1;

  if (dir !== 0) {
    player.vx = dir * speed;
  } else {
    player.vx = player.vx * Math.pow(0.002, dt);   // friction
  }

  // Stamina
  if (wantRun && dir !== 0) {
    player.stamina = Math.max(0, player.stamina - 30 * dt);
  } else {
    player.stamina = Math.min(100, player.stamina + 20 * dt);
  }

  // Gravity
  if (!player.onGround) player.vy += GRAVITY * dt;

  // Jump
  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  // Move
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  if (player.x < 20) { player.x = 20; player.vx = 0; }

  // ── Platform collision ──
  player.onGround = false;
  const foot = player.y;

  for (const p of platforms) {
    const inX = player.x + player.w / 2 > p.x && player.x - player.w / 2 < p.x + p.w;
    if (!inX) continue;
    const prevFoot = foot - player.vy * dt;
    if (prevFoot <= p.y + 2 && foot >= p.y) {
      player.y       = p.y;
      player.vy      = 0;
      player.onGround = true;
    }
  }

  // Fell off world → die
  if (player.y > H + 200) { killPlayer(); return; }

  // Bob
  if (Math.abs(player.vx) > 10 && player.onGround) {
    player.bobTimer += dt * 10;
  } else {
    player.bobTimer = 0;
  }

  // ── Stat decay (scaled by difficulty) ──
  player.hunger = Math.max(0, player.hunger - HUNGER_DECAY_BASE * decayMult * dt);
  player.thirst = Math.max(0, player.thirst - THIRST_DECAY_BASE * decayMult * dt);

  if (player.hunger <= 0 || player.thirst <= 0) { killPlayer(); return; }

  // ── Score: (distance×0.1 + time×0.5) × scoreMult ──
  const dist = Math.max(0, (player.x - player.startX) / 100);
  score = (dist * 0.1 + worldTime * 0.5) * scoreMult;

  // ── Camera ──
  const targetCamX = player.x - W * 0.30;
  cameraX += (targetCamX - cameraX) * Math.min(1, dt * 5);

  // ── World gen ──
  ensureGround(cameraX + W + 900);

  while (nextPlatformX < cameraX + W + 500) {
    spawnPlatform(nextPlatformX);
    nextPlatformX += rand(200, 420);
  }
  while (nextCrateX < cameraX + W + 300) {
    spawnCrate(nextCrateX, cfg);
    nextCrateX += rand(cfg.crateGapMin, cfg.crateGapMax);
  }

  // ── Despawn ──
  const cutoff = cameraX - 1400;
  platforms = platforms.filter(p => p.x + p.w > cutoff);
  crates    = crates.filter(c => c.x + c.w > cutoff || c.labelTimer > 0);

  // ── Crate collection (simple AABB) ──
  const pl = player.x - player.w / 2, pr = player.x + player.w / 2;
  const pt = player.y - player.h,     pb = player.y;

  for (const c of crates) {
    if (c.collected) {
      c.labelTimer -= dt;
      c.labelY     -= 30 * dt;
      continue;
    }
    if (pr > c.x && pl < c.x + c.w && pb > c.y && pt < c.y + c.h) {
      c.collected  = true;
      c.labelTimer = 1.5;
      c.labelY     = c.y - 10;
      switch (c.type) {
        case 'food':     player.hunger  = Math.min(100, player.hunger  + 30); c.label = '+FOOD';   break;
        case 'water':    player.thirst  = Math.min(100, player.thirst  + 35); c.label = '+WATER';  break;
        case 'medicine': player.health  = Math.min(100, player.health  + 25); c.label = '+HEALTH'; break;
        case 'fuel':     player.stamina = Math.min(100, player.stamina + 40); c.label = '+STAM';   break;
      }
    }
  }

  // ── Stage flash timer ──
  if (stageFlash) {
    stageFlash.timer -= dt;
    if (stageFlash.timer <= 0) stageFlash = null;
  }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  state = 'dead';
}

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
function draw() {
  const cfg = STAGE_CONFIG[difficultyStage] || STAGE_CONFIG[1];

  // Sky
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // ── Parallax ruins (scroll multiplier increases with stage) ──
  const sm = cfg.scrollMult;
  for (const r of bgRuins) {
    const rx = r.x - cameraX * r.layer * sm;
    ctx.fillStyle = `rgba(28, 22, 42, 0.92)`;
    ctx.fillRect(rx, r.baseY - r.h, r.w, r.h);
  }

  // ── World (camera-shifted) ──
  ctx.save();
  ctx.translate(-Math.round(cameraX), 0);

  // Ground & platforms
  for (const p of platforms) {
    ctx.fillStyle = p.isGround ? '#2a2a3e' : '#3a2a4e';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    if (!p.isGround) {
      ctx.fillStyle = 'rgba(233,69,96,0.38)';
      ctx.fillRect(p.x, p.y, p.w, 3);
    }
  }

  // Crates
  const crateColors = { food: '#44cc66', water: '#44aaff', medicine: '#ff6688', fuel: '#ffaa22' };
  for (const c of crates) {
    if (!c.collected) {
      ctx.fillStyle = crateColors[c.type] || '#aaa';
      ctx.fillRect(c.x, c.y, c.w, c.h);
      // Icon
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(c.type[0].toUpperCase(), c.x + c.w / 2, c.y + c.h - 8);
    }
    if (c.labelTimer > 0) {
      const alpha = Math.min(1, c.labelTimer);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffff88';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(c.label, c.x + c.w / 2, c.labelY);
      ctx.restore();
    }
  }

  // Player
  const bob   = player.onGround && Math.abs(player.vx) > 10 ? Math.sin(player.bobTimer) * 3 : 0;
  const pCol  = player.dead ? '#e94560' : '#1AE0C8';
  const pColH = player.dead ? '#e94560' : '#22f5da';
  const px    = player.x;
  const py    = player.y;
  // Body
  ctx.fillStyle = pCol;
  ctx.fillRect(px - player.w / 2, py - player.h + bob, player.w, player.h - 16);
  // Head
  ctx.fillStyle = pColH;
  ctx.fillRect(px - 9, py - player.h - 16 + bob, 18, 16);
  // Eyes
  if (!player.dead) {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(px - 6, py - player.h - 12 + bob, 4, 4);
    ctx.fillRect(px + 2,  py - player.h - 12 + bob, 4, 4);
  }

  ctx.restore();

  // ── HUD ──
  drawHUD(cfg);

  // ── Stage flash ──
  if (stageFlash && state === 'playing') {
    const t   = stageFlash.timer;
    const alpha = t > 1.5 ? 1 : t / 1.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Background glow strip
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H / 2 - 50, W, 80);
    ctx.fillStyle = stageFlash.color;
    ctx.font = 'bold 52px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(stageFlash.text, W / 2, H / 2 + 8);
    ctx.restore();
  }

  // ── Death screen ──
  if (state === 'dead') drawDeathScreen(cfg);
}

function drawHUD(cfg) {
  const M = 16;

  // Stat bars
  const BAR_W = 160, BAR_H = 14;
  const stats = [
    { label: 'HUNGER',  val: player.hunger,  col: '#00ff88' },
    { label: 'THIRST',  val: player.thirst,  col: '#00e6ff' },
    { label: 'STAMINA', val: player.stamina, col: '#ffdd44' },
  ];
  ctx.textAlign = 'left';
  for (let i = 0; i < stats.length; i++) {
    const s = stats[i];
    const gy = M + i * 26;
    ctx.fillStyle = s.col;
    ctx.font = '10px monospace';
    ctx.fillText(s.label, M, gy + 11);
    ctx.fillStyle = 'rgba(30,30,48,0.88)';
    ctx.fillRect(M + 62, gy, BAR_W, BAR_H);
    ctx.fillStyle = s.col;
    ctx.fillRect(M + 62, gy, BAR_W * Math.max(0, s.val / 100), BAR_H);
  }

  // Top-right info
  const dist = Math.max(0, (player.x - player.startX) / 100);
  const mins = Math.floor(worldTime / 60);
  const secs = Math.floor(worldTime % 60);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#e8e8ff';
  ctx.font = '14px monospace';
  ctx.fillText(dist.toFixed(0) + 'm', W - M, 28);

  ctx.fillStyle = '#aaaacc';
  ctx.font = '12px monospace';
  ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, W - M, 46);

  // Score (prominent)
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SCORE: ' + Math.floor(score), W - M, 70);

  // Stage label (color-coded)
  ctx.fillStyle = cfg.color;
  ctx.font = 'bold 13px monospace';
  ctx.fillText(`STAGE ${difficultyStage} — ${cfg.name}`, W - M, 92);
}

function drawDeathScreen(cfg) {
  ctx.fillStyle = 'rgba(10,4,12,0.90)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('YOU DIED', W / 2, 275);

  const dist = Math.max(0, (player.x - player.startX) / 100);
  const mins = Math.floor(worldTime / 60);
  const secs = Math.floor(worldTime % 60);

  ctx.fillStyle = '#aaaacc';
  ctx.font = '22px monospace';
  ctx.fillText(`Time Survived: ${mins}:${secs.toString().padStart(2, '0')}`, W / 2, 348);
  ctx.fillText(`Distance Travelled: ${dist.toFixed(0)}m`, W / 2, 386);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('FINAL SCORE: ' + Math.floor(score), W / 2, 434);

  ctx.fillStyle = cfg.color;
  ctx.font = '16px monospace';
  ctx.fillText(`Stage Reached: ${difficultyStage} — ${cfg.name}`, W / 2, 464);

  // Blinking restart hint
  if (Math.floor(Date.now() / 700) % 2 === 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '20px monospace';
    ctx.fillText('PRESS R TO RESTART', W / 2, 514);
  }
}

// ══════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════
let lastTs = null;

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  if (e.code === 'KeyR' && state === 'dead') {
    initGame();
    lastTs = null;
  }
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
